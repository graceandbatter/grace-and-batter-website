<main class="page-content">

    <h2>Place an Order</h2>

    <div class="menu-card">

        <h3>Order Request Form</h3>

        <p>
            Complete the information below and we'll contact you
            regarding your order.
        </p>

        <form>

            <input type="text" placeholder="Your Name">

            <br><br>

            <input type="email" placeholder="Email Address">

            <br><br>

            <input type="text" placeholder="Phone Number">

            <br><br>

            <select>
                <option>Select Dessert</option>
                <option>Biscoff Cheesecake</option>
                <option>Banana Pudding</option>
                <option>Chocolate Chip Cookies</option>
                <option>Custom Order</option>
            </select>

            <br><br>

            <textarea placeholder="Tell us about your order"></textarea>

            <br><br>

            <button type="submit">Submit Request</button>

        </form>

    </div>

</main>
